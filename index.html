<!DOCTYPE html>
<html>
<head>
    <script src="js/templates.js"></script>
    <script src="js/resume-styles.js"></script>

    <script src="js/Sortable-1.15.4/Sortable.js"></script> <!-- your local Sortable -->
    <script src="js/resume-builder.js"></script>
    <link rel="stylesheet" type="text/css" href="css/resume-builder.css" />
    <link rel="stylesheet" type="text/css" id="resume-style" href="css/resume-styles/vermillion.css" />
</head>
<!-- <form> -->
<body>
<div id="rb-host">

</div><!-- rb-host -->

<div id="rb-toolbox"><!-- Begin section of buttons for saving etc. -->
  <fieldset id="rb-file-controls">
    <legend>File Functions</legend>
    <div class="rb-flex-wrap">
    <!-- download arrow &#x2913; or down arrow  &#x2B07; -->
    <a href="#" id="rb-export-resume" class="rb-save-load-btn"><span class="rb-download-arrow">&#x2913;</span> Export Resume </a>
    <a href="#" id="rb-resume-save-all" class="rb-save-load-btn"><span class="rb-download-arrow">&#x2913;</span> Save Master Resume</a>
    <button id="rb-load-button" class="rb-save-load-btn">Load File</button>
    <input type="file" id="rb-file-input" accept=".html">
    <label for="rb-style-change">
        Change the Resume Style:
        <select id="rb-style-change"></select>
    </label>
    </div>
  </fieldset>
  <fieldset id="rb-section-controls">
    <legend>Add Sections</legend>
    <div class="rb-flex-wrap">
      <button type="button"  onclick="addMainSection('education-section')">+ Education Section</button>
      <button type="button" onclick="addMainSection('work-section')">+ Work Section</button>
      <button type="button" onclick="addMainSection('skills-section')">+ Skills Section</button>
      <button type="button" onclick="addMainSection('summary-section')">+ Summary Section</button>
      <button type="button" onclick="addMainSection('activities-section')">+ Activities Section</button>
    </div>
  </fieldset>
</div> <!-- end toolbox buttons saving etc -->



</body>
</html>
